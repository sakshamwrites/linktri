<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Social Links - Connect with me everywhere">
    <title>My Links</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Animated Background Orbs -->
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header class="profile">
            <div class="avatar-wrapper">
                <img src="assets/profile.jpg" alt="Profile Picture" class="avatar">
                <div class="avatar-glow"></div>
            </div>
            <h1 class="name">Helix</h1>
            <p class="bio">The Tech & AI Club of RVSCET</p>
        </header>

        <main class="links" id="linksContainer">
            <a href="https://instagram.com" target="_blank" class="link-item tilt-element">
                <i class="fa-brands fa-instagram icon"></i>
                <span>Instagram</span>
            </a>
            <a href="https://facebook.com" target="_blank" class="link-item tilt-element">
                <i class="fa-brands fa-facebook icon"></i>
                <span>Facebook</span>
            </a>
            <a href="https://youtube.com" target="_blank" class="link-item tilt-element">
                <i class="fa-brands fa-youtube icon"></i>
                <span>YouTube</span>
            </a>
            <a href="https://discord.com" target="_blank" class="link-item tilt-element">
                <i class="fa-brands fa-discord icon"></i>
                <span>Discord</span>
            </a>
            <a href="https://linkedin.com" target="_blank" class="link-item tilt-element">
                <i class="fa-brands fa-linkedin icon"></i>
                <span>LinkedIn</span>
            </a>
        </main>

        <footer class="footer">
            <button class="share-btn" id="shareBtn">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Share Profile
            </button>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i> Link copied to clipboard!
    </div>

    <script src="script.js"></script>
</body>

</html>
